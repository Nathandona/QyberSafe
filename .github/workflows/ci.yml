name: QyberSafe CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BUILD_TYPE: Release

jobs:
  build-and-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev ninja-build

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl@3 ninja
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"

      # liboqs and GoogleTest are fetched at configure time via FetchContent.
      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DBUILD_EXAMPLES=OFF
          -DBUILD_DOCUMENTATION=OFF
          -DENABLE_CLANG_TIDY=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitizers:
    name: asan + ubsan (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev ninja-build

      # A Debug build enables AddressSanitizer and UndefinedBehaviorSanitizer
      # (see the top-level CMakeLists.txt).
      - name: Configure (Debug)
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DBUILD_EXAMPLES=OFF
          -DBUILD_DOCUMENTATION=OFF
          -DENABLE_CLANG_TIDY=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test under sanitizers
        run: ctest --test-dir build --output-on-failure

  lint:
    name: static analysis (informational)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Informational until the remaining modules are ported; failures here do
      # not block the build.
      - name: cppcheck (ported sources)
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck
          cppcheck --enable=warning,performance,portability \
            --error-exitcode=1 \
            --suppress=missingInclude --suppress=missingIncludeSystem \
            -I src/include \
            src/src/core src/src/kyber

      - name: clang-format check
        continue-on-error: true
        uses: DoozyX/clang-format-lint-action@v0.18.2
        with:
          source: 'src/src/kyber src/src/core src/include'
          extensions: 'h,cpp'
          clangFormatVersion: 18

  python:
    name: python wheel (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev ninja-build
          python -m pip install --upgrade pip pytest

      # Builds the wheel via scikit-build-core, which drives CMake (fetching and
      # statically bundling liboqs) and installs the extension module.
      - name: Build and install wheel
        run: python -m pip install --verbose .

      - name: Test the installed package
        run: |
          cd "$HOME"
          python -m pytest -v "$GITHUB_WORKSPACE/python/tests"

  windows:
    name: build & test (windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cache the vcpkg-built OpenSSL in the GitHub Actions cache so it is built
      # from source only once, then restored in seconds on later runs.
      - name: Export Actions cache env for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '')
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '')

      - name: Install OpenSSL (vcpkg)
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        run: vcpkg install openssl:x64-windows

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=Release
          -DBUILD_EXAMPLES=OFF -DBUILD_DOCUMENTATION=OFF -DENABLE_CLANG_TIDY=OFF
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: |
          $env:PATH = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin;$env:PATH"
          ctest --test-dir build -C Release --output-on-failure
