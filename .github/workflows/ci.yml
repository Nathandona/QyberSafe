name: QyberSafe CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BUILD_TYPE: Release

jobs:
  build-and-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev ninja-build

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl@3 ninja
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"

      # liboqs and GoogleTest are fetched at configure time via FetchContent.
      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DBUILD_EXAMPLES=OFF
          -DBUILD_DOCUMENTATION=OFF
          -DENABLE_CLANG_TIDY=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitizers:
    name: asan + ubsan (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev ninja-build

      # A Debug build enables AddressSanitizer and UndefinedBehaviorSanitizer
      # (see the top-level CMakeLists.txt).
      - name: Configure (Debug)
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DBUILD_EXAMPLES=OFF
          -DBUILD_DOCUMENTATION=OFF
          -DENABLE_CLANG_TIDY=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test under sanitizers
        run: ctest --test-dir build --output-on-failure

  lint:
    name: static analysis (informational)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Informational until the remaining modules are ported; failures here do
      # not block the build.
      - name: cppcheck (ported sources)
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck
          cppcheck --enable=warning,performance,portability \
            --error-exitcode=1 \
            --suppress=missingInclude --suppress=missingIncludeSystem \
            -I src/include \
            src/src/core src/src/kyber

      - name: clang-format check
        continue-on-error: true
        uses: DoozyX/clang-format-lint-action@v0.18.2
        with:
          source: 'src/src/kyber src/src/core src/include'
          extensions: 'h,cpp'
          clangFormatVersion: 18

  python:
    name: python bindings (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev ninja-build
          python -m pip install --upgrade pip pybind11 pytest

      - name: Build the Python module
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTS=OFF -DBUILD_EXAMPLES=OFF -DBUILD_DOCUMENTATION=OFF \
            -DENABLE_CLANG_TIDY=OFF \
            -DQYBERSAFE_BUILD_PYTHON=ON \
            -Dpybind11_DIR=$(python -m pybind11 --cmakedir)
          cmake --build build --target qybersafe_python --parallel

      - name: Test
        run: |
          cd python
          PYTHONPATH=. python -m pytest -v tests/
