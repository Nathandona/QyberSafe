<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="340" viewBox="0 0 1280 340" fill="none" role="img" aria-label="QyberSafe - Post-Quantum Cryptography Library">
  <defs>
    <pattern id="lattice" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.3" fill="#16284a"/>
    </pattern>
  </defs>

  <!-- Flat base -->
  <rect width="1280" height="340" rx="18" fill="#0b1120"/>
  <rect width="1280" height="340" rx="18" fill="url(#lattice)"/>
  <rect x="1" y="1" width="1278" height="338" rx="17" fill="none" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Wordmark -->
  <text x="80" y="194" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="74" font-weight="700" fill="#f8fafc" letter-spacing="-1.5">QyberSafe</text>
  <text x="82" y="234" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="21" font-weight="500" fill="#94a3b8" letter-spacing="0.2">Post-Quantum Cryptography for C++ and Python</text>

  <!-- Divider -->
  <line x1="800" y1="92" x2="800" y2="268" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Primitives spec panel -->
  <text x="838" y="118" font-family="'Consolas', 'SF Mono', monospace" font-size="13" font-weight="700" fill="#475569" letter-spacing="2.5">STANDARDIZED PRIMITIVES</text>

  <text font-family="'Consolas', 'SF Mono', monospace" font-size="19" y="162" font-weight="600">
    <tspan x="838" fill="#e2e8f0">Kyber</tspan>
    <tspan x="996" fill="#38bdf8">KEM</tspan>
    <tspan x="1148" fill="#64748b">FIPS 203</tspan>
  </text>
  <text font-family="'Consolas', 'SF Mono', monospace" font-size="19" y="200" font-weight="600">
    <tspan x="838" fill="#e2e8f0">Dilithium</tspan>
    <tspan x="996" fill="#38bdf8">Sign</tspan>
    <tspan x="1148" fill="#64748b">FIPS 204</tspan>
  </text>
  <text font-family="'Consolas', 'SF Mono', monospace" font-size="19" y="238" font-weight="600">
    <tspan x="838" fill="#e2e8f0">SPHINCS+</tspan>
    <tspan x="996" fill="#38bdf8">Sign</tspan>
    <tspan x="1148" fill="#64748b">FIPS 205</tspan>
  </text>

  <line x1="838" y1="256" x2="1216" y2="256" stroke="#1e293b" stroke-width="1.5"/>
  <text x="838" y="284" font-family="'Consolas', 'SF Mono', monospace" font-size="14" font-weight="600" fill="#64748b" letter-spacing="0.5">Hybrid  =  AES-256-GCM  +  Kyber</text>
</svg>
